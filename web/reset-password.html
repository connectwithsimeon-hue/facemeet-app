<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F4513E" />
    <title>Reset FaceMeet Password</title>
    <style>
      :root {
        color-scheme: dark;
        --coral: #f4513e;
        --ink: #fff8f2;
        --muted: #b8aaa2;
        --bg: #050202;
        --panel: rgba(28, 18, 15, 0.9);
        --border: rgba(244, 81, 62, 0.36);
        --error: #ff4458;
        --success: #00c853;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(244, 81, 62, 0.18), transparent 34rem),
          linear-gradient(180deg, #120805 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 460px);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      img {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        object-fit: cover;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 7vw, 38px);
        line-height: 1.06;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.6;
      }

      label {
        display: block;
        margin: 14px 0 8px;
        color: var(--ink);
        font-weight: 700;
        font-size: 14px;
      }

      input {
        width: 100%;
        min-height: 52px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 0 16px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--ink);
        font: inherit;
      }

      .password-field {
        position: relative;
      }

      .password-field input {
        padding-right: 58px;
      }

      .password-toggle {
        position: absolute;
        top: 50%;
        right: 8px;
        width: 44px;
        min-height: 44px;
        margin: 0;
        transform: translateY(-50%);
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        display: grid;
        place-items: center;
      }

      .password-toggle:focus-visible {
        outline: 2px solid var(--coral);
        outline-offset: 2px;
      }

      button,
      a.button {
        width: 100%;
        min-height: 52px;
        margin-top: 18px;
        border: 0;
        border-radius: 999px;
        background: var(--coral);
        color: white;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .message {
        margin-top: 16px;
        padding: 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--muted);
        line-height: 1.45;
      }

      .message.success {
        border: 1px solid rgba(0, 200, 83, 0.45);
        color: var(--ink);
      }

      .message.error {
        border: 1px solid rgba(255, 68, 88, 0.45);
        color: var(--ink);
      }

      .message h2 {
        margin: 0 0 10px;
        color: var(--ink);
        font-size: 22px;
        line-height: 1.18;
      }

      .message p {
        margin: 0 0 12px;
      }

      .message p:last-child {
        margin-bottom: 0;
      }

      .message .helper {
        font-size: 13px;
        color: var(--muted);
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="icons/apple-touch-icon.png" alt="FaceMeet" />
        <strong>FaceMeet</strong>
      </div>
      <h1>Reset your FaceMeet password</h1>
      <p>Enter a new password below. After it is updated, return to FaceMeet and sign in.</p>

      <form id="reset-form">
        <label for="password">New password</label>
        <div class="password-field">
          <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required />
          <button
            class="password-toggle"
            type="button"
            data-target="password"
            aria-label="Show new password"
            aria-pressed="false"
          >👁</button>
        </div>

        <label for="confirm-password">Confirm password</label>
        <div class="password-field">
          <input id="confirm-password" name="confirm-password" type="password" minlength="8" autocomplete="new-password" required />
          <button
            class="password-toggle"
            type="button"
            data-target="confirm-password"
            aria-label="Show confirm password"
            aria-pressed="false"
          >👁</button>
        </div>

        <button id="submit-button" type="submit">Update Password</button>
      </form>

      <div id="message" class="message hidden"></div>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const supabase = createClient(
        "https://vbaiivsvjdntzaffboue.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiYWlpdnN2amRudHphZmZib3VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODk2NjQsImV4cCI6MjA5MTc2NTY2NH0.ZNzIdnuQXf69nLmo7FafLASNOG6_2m36JZQKCIQzK-w"
      );

      const form = document.getElementById("reset-form");
      const password = document.getElementById("password");
      const confirmPassword = document.getElementById("confirm-password");
      const button = document.getElementById("submit-button");
      const message = document.getElementById("message");
      let pendingRecoveryTokenHash = null;

      document.querySelectorAll(".password-toggle").forEach((toggle) => {
        toggle.addEventListener("click", () => {
          const targetId = toggle.getAttribute("data-target");
          const input = document.getElementById(targetId);
          if (!input) return;

          const shouldShow = input.type === "password";
          input.type = shouldShow ? "text" : "password";
          toggle.textContent = shouldShow ? "🙈" : "👁";
          toggle.setAttribute("aria-pressed", String(shouldShow));
          toggle.setAttribute(
            "aria-label",
            `${shouldShow ? "Hide" : "Show"} ${targetId === "password" ? "new" : "confirm"} password`
          );
        });
      });

      function showMessage(text, type) {
        message.textContent = text;
        message.className = `message ${type || ""}`;
        message.classList.remove("hidden");
      }

      function showSuccessMessage() {
        message.innerHTML = `
          <h2>Password updated successfully</h2>
          <p>You can now close this page.</p>
          <p>Open the FaceMeet app from your Home Screen and sign in with your new password.</p>
          <p class="helper">If you have not installed FaceMeet yet, open app.facemeet.app in Safari or Chrome and add it to your Home Screen.</p>
        `;
        message.className = "message success";
        message.classList.remove("hidden");
      }

      function parseParams() {
        const query = new URLSearchParams(window.location.search);
        const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
        const read = (key) => query.get(key) || hash.get(key);

        console.info("RESET PASSWORD: page loaded", {
          hasQueryParams: Array.from(query.keys()).length > 0,
          hasHashParams: Array.from(hash.keys()).length > 0,
          hasCode: Boolean(read("code")),
          hasTokenHash: Boolean(read("token_hash")),
          hasAccessToken: Boolean(read("access_token")),
          hasRefreshToken: Boolean(read("refresh_token")),
          hasError: Boolean(read("error") || read("error_code")),
          recoveryTypeDetected: read("type") === "recovery",
        });

        return {
          code: read("code"),
          tokenHash: read("token_hash"),
          accessToken: read("access_token"),
          refreshToken: read("refresh_token"),
          type: read("type"),
          error: read("error"),
          errorCode: read("error_code"),
          errorDescription: read("error_description"),
        };
      }

      async function initializeResetSession() {
        const {
          code,
          tokenHash,
          accessToken,
          refreshToken,
          type,
          error,
          errorCode,
          errorDescription,
        } = parseParams();

        try {
          if (error || errorCode) {
            console.warn("RESET PASSWORD: recovery link returned an auth error", {
              errorCode: errorCode || error || "unknown",
            });
            showMessage(
              errorCode === "otp_expired"
                ? "This reset link has already been used or expired before FaceMeet could open it. Please request a fresh password reset email from FaceMeet."
                : errorDescription || "This reset link could not be opened. Please request a new password reset email from FaceMeet.",
              "error"
            );
            form.classList.add("hidden");
            return false;
          }

          if (code) {
            console.info("RESET PASSWORD: exchanging PKCE code");
            const { error } = await supabase.auth.exchangeCodeForSession(code);
            if (error) throw error;
            console.info("RESET PASSWORD: session set success");
            return true;
          }

          if (tokenHash && type === "recovery") {
            pendingRecoveryTokenHash = tokenHash;
            console.info("RESET PASSWORD: recovery token hash ready for password submit");
            return true;
          }

          if (accessToken && refreshToken) {
            console.info("RESET PASSWORD: setting recovery session from URL tokens");
            const { error } = await supabase.auth.setSession({
              access_token: accessToken,
              refresh_token: refreshToken,
            });
            if (error) throw error;
            console.info("RESET PASSWORD: session set success");
            return true;
          }

          if (type === "recovery") {
            console.info("RESET PASSWORD: recovery type detected without URL tokens; checking existing session");
            const { data, error } = await supabase.auth.getSession();
            if (error) throw error;
            if (data?.session) {
              console.info("RESET PASSWORD: existing recovery session found");
              return true;
            }
          }
        } catch (error) {
          console.warn("RESET PASSWORD: session set failure", {
            message: error?.message || "Unknown reset session error",
          });
          showMessage(
            "This reset link could not be opened. Please request a new password reset email from FaceMeet.",
            "error"
          );
          form.classList.add("hidden");
          return false;
        }

        showMessage(
          "This reset link could not be read. Please request a new password reset email from FaceMeet.",
          "error"
        );
        form.classList.add("hidden");
        return false;
      }

      const hasSession = await initializeResetSession();

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!hasSession) return;

        const newPassword = password.value;
        const confirmValue = confirmPassword.value;
        if (newPassword.length < 8) {
          showMessage("Password must be at least 8 characters.", "error");
          return;
        }
        if (newPassword !== confirmValue) {
          showMessage("Passwords do not match.", "error");
          return;
        }

        button.disabled = true;
        button.textContent = "Updating...";

        if (pendingRecoveryTokenHash) {
          console.info("RESET PASSWORD: verifying recovery token hash on submit");
          const { error } = await supabase.auth.verifyOtp({
            token_hash: pendingRecoveryTokenHash,
            type: "recovery",
          });
          if (error) {
            console.warn("RESET PASSWORD: recovery token verification failure", {
              message: error.message || "Recovery token verification failed",
            });
            showMessage(
              "This reset link has already been used or expired. Please request a fresh password reset email from FaceMeet.",
              "error"
            );
            button.disabled = false;
            button.textContent = "Update Password";
            return;
          }
          pendingRecoveryTokenHash = null;
        }

        const { error } = await supabase.auth.updateUser({
          password: newPassword,
        });

        if (error) {
          console.warn("RESET PASSWORD: password update failure", {
            message: error.message || "Password update failed",
          });
          showMessage(error.message || "Password update failed. Please try again.", "error");
          button.disabled = false;
          button.textContent = "Update Password";
          return;
        }

        console.info("RESET PASSWORD: password update success");
        form.classList.add("hidden");
        showSuccessMessage();
      });
    </script>
  </body>
</html>
