name: facemeet
description: A new Flutter project.
publish_to: none
version: 1.0.46+123

environment:
  sdk: ^3.9.0

dependencies:
  flutter:       # CRITICAL: Required for every Flutter project - DO NOT REMOVE
    sdk: flutter # CRITICAL: Required for every Flutter project - DO NOT REMOVE
  
  # CRITICAL: Core UI and responsive design - DO NOT REMOVE OR MODIFY
  supabase_flutter: ^2.9.1
  sizer: ^2.0.15              # Required for responsive design system
  flutter_svg: ^2.0.9        # Required for SVG icon support
  google_fonts: ^6.1.0       # Required for typography (replaces local fonts)
  shared_preferences: ^2.2.2 # Required for local data storage
  web: ^1.1.1
  flutter_secure_storage: ^9.2.4 # Secure device storage for Supabase session persistence (used automatically by supabase_flutter under the hood)
  provider: ^6.1.2           # ChangeNotifierProvider for SubscriptionProvider global state
  
  # Feature dependencies - safe to modify
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.1.4
  dio: ^5.4.0
  fluttertoast: ^8.2.4
  fl_chart: ^0.65.0
  camera: ^0.10.5+5           # front camera video recording for onboarding step 4
  permission_handler: ^11.1.0 # camera and location permissions on mobile
  geolocator: ^13.0.4         # device location for onboarding step 3
  google_sign_in: ^6.2.2      # Google OAuth sign-in
  daily_flutter: ^0.37.0      # Daily.co native Flutter SDK for real-time video calls in Spark Sessions (iOS/Android only, web-incompatible handled via conditional imports)
  video_player: ^2.10.1       # Play looping muted profile videos on discovery cards
  webview_flutter: ^4.13.1    # Load Daily.co video room URL in WebView for web/fallback platform
  url_launcher: ^6.3.2        # Launch Stripe checkout URLs in external browser
  image_picker: ^1.0.4        # Pick videos from device gallery for profile video re-upload
  app_links: ^6.4.1           # Handle facemeet:// deep links for Stripe payment return flow
  package_info_plus: ^9.0.1   # Read app version/build for support emails
  video_thumbnail_plus: ^0.0.2 # Generate JPEG thumbnail from profile video at 0ms for avatar display
  flutter_contacts: ^1.1.9+1  # Read device contacts for invite friends feature
  share_plus: ^10.1.4         # System share sheet for invite friends
  google_mlkit_face_detection: ^0.13.2 # Face detection on recorded video frames after recording stops
  firebase_core: ^4.7.0       # Firebase core initialization required for all Firebase services
  firebase_messaging: ^16.2.0 # Firebase Cloud Messaging for push notifications
  flutter_local_notifications: ^19.5.0 # Show foreground notifications when app is open (web-incompatible, will use kIsWeb guard)
  wakelock_plus: ^1.3.3       # Keep screen awake during Spark video calls on Android/iOS
  purchases_flutter: ^10.0.1  # RevenueCat SDK for native in-app purchases on iOS and Android

  universal_html: ^2.2.4
dev_dependencies:
  flutter_test:    # CRITICAL: Required for Flutter project testing - DO NOT REMOVE
    sdk: flutter   # CRITICAL: Required for Flutter project testing - DO NOT REMOVE
  flutter_lints: ^5.0.0 # CRITICAL: Required for code quality - DO NOT REMOVE
  flutter_launcher_icons: ^0.14.1 # Generate app icons for iOS and Android

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon-1776652935052.png"
  min_sdk_android: 21
  remove_alpha_channel_ios: true
  web:
    generate: false

flutter:
  uses-material-design: true # CRITICAL: Required for Material icon font - DO NOT REMOVE
  assets:
    - assets/
    - assets/images/
    - assets/icons/
  # CRITICAL ASSET MANAGEMENT RULES:
  # - DO NOT ADD NEW ASSET DIRECTORIES (assets/svg/, assets/icons/, etc.)
  # - ONLY USE EXISTING AND ITEMS AVAILABLE IN THE DIRECTORIES LISTED ABOVE (assets/, assets/images/)
  
  # CRITICAL FONTS RULE: 
  # - THIS PROJECT USES GOOGLE FONTS INSTEAD OF LOCAL FONTS
  # - DO NOT ADD ANY LOCAL FONTS SECTION OR FONT FILES
